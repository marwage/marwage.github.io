{{ define "main" }}
<article>
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ .Date.Format (.Site.Params.dateFormat | default "2 January 2006") }}
      &middot; {{ .ReadingTime }} min read
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  {{ with .Parent }}<a href="{{ .RelPermalink }}" class="back-link">&larr; Back</a>{{ end }}
</article>
{{ end }}
