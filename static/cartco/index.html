<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car TCO Comparison</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
        h1 { text-align: center; margin-bottom: 1.5rem; }
        .lang-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: .3rem .6rem;
            font-size: .85rem;
            cursor: pointer;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
        }
        .lang-toggle:hover { background: #eee; }
        .inputs { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
        .panel {
            background: #fff;
            border-radius: 8px;
            padding: 1.5rem;
            min-width: 260px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
        }
        .panel h2 { margin-bottom: 1rem; font-size: 1.1rem; }
        .panel.electric h2 { color: #2563eb; }
        .panel.gasoline h2 { color: #dc2626; }
        label { display: block; margin-bottom: .25rem; font-size: .9rem; }
        input {
            width: 100%;
            padding: .4rem .6rem;
            margin-bottom: .75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        .chart-wrapper {
            position: relative;
            max-width: 900px;
            height: 400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            h1 { font-size: 1.2rem; }
            .inputs { gap: 1rem; }
            .panel { min-width: 0; width: 100%; }
            .chart-wrapper { height: 300px; }
        }
    </style>
</head>
<body>
    <button class="lang-toggle" id="lang-toggle">DE</button>
    <h1 id="title">Total Cost of Ownership: Electric vs Gasoline</h1>

    <div class="inputs">
        <div class="panel electric">
            <h2 id="ev-heading">Electric Car</h2>
            <label id="ev-price-label" for="ev-price">Car price (€)</label>
            <input id="ev-price" type="number" value="74700" step="500">
            <label id="ev-energy-price-label" for="ev-energy-price">€ / kWh</label>
            <input id="ev-energy-price" type="number" value="0.38" step="0.01">
            <label id="ev-consumption-label" for="ev-consumption">kWh / 100 km</label>
            <input id="ev-consumption" type="number" value="17.9" step="0.5">
        </div>
        <div class="panel gasoline">
            <h2 id="gas-heading">Gasoline Car</h2>
            <label id="gas-price-label" for="gas-price">Car price (€)</label>
            <input id="gas-price" type="number" value="66900" step="500">
            <label id="gas-energy-price-label" for="gas-energy-price">€ / l</label>
            <input id="gas-energy-price" type="number" value="2.12" step="0.01">
            <label id="gas-consumption-label" for="gas-consumption">l / 100 km</label>
            <input id="gas-consumption" type="number" value="7.6" step="0.5">
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="chart"></canvas>
    </div>
    <p id="breakeven" style="text-align:center; margin-top:1rem; font-size:1rem; color:#555;"></p>

    <script>
        var MAX_KM = 250000;
        var lang = 'en';

        var i18n = {
            en: {
                title: 'Total Cost of Ownership: Electric vs Gasoline',
                evHeading: 'Electric Car',
                gasHeading: 'Gasoline Car',
                carPrice: 'Car price (€)',
                evEnergyPrice: '€ / kWh',
                evConsumption: 'kWh / 100 km',
                gasEnergyPrice: '€ / l',
                gasConsumption: 'l / 100 km',
                xAxis: 'Mileage (km)',
                yAxis: 'Total Cost of Ownership (€)',
                evLabel: 'Electric',
                gasLabel: 'Gasoline',
                toggleLabel: 'DE',
                breakevenAt: function(km) { return 'Break-even at ' + km + ' km.'; },
                evAlwaysCheaper: 'The electric car is always cheaper.',
                gasAlwaysCheaper: 'The gasoline car is always cheaper.',
                noBreakeven: 'No break-even within 250,000 km.',
            },
            de: {
                title: 'Gesamtkosten: Elektro vs. Verbrenner',
                evHeading: 'Elektro',
                gasHeading: 'Verbrenner',
                carPrice: 'Kaufpreis (€)',
                evEnergyPrice: '€ / kWh',
                evConsumption: 'kWh / 100 km',
                gasEnergyPrice: '€ / l',
                gasConsumption: 'l / 100 km',
                xAxis: 'Kilometerstand (km)',
                yAxis: 'Gesamtkosten (€)',
                evLabel: 'Elektro',
                gasLabel: 'Verbrenner',
                toggleLabel: 'EN',
                breakevenAt: function(km) { return 'Gleichstand bei ' + km + ' km.'; },
                evAlwaysCheaper: 'Der Elektro ist immer günstiger.',
                gasAlwaysCheaper: 'Der Verbrenner ist immer günstiger.',
                noBreakeven: 'Kein Gleichstand innerhalb von 250.000 km.',
            },
        };

        function t() { return i18n[lang]; }

        var inputs = {
            evPrice: document.getElementById('ev-price'),
            evEnergyPrice: document.getElementById('ev-energy-price'),
            evConsumption: document.getElementById('ev-consumption'),
            gasPrice: document.getElementById('gas-price'),
            gasEnergyPrice: document.getElementById('gas-energy-price'),
            gasConsumption: document.getElementById('gas-consumption'),
        };

        function val(el) { return parseFloat(el.value) || 0; }

        function tco(carPrice, consumptionPer100, energyPrice, km) {
            return carPrice + (consumptionPer100 / 100) * energyPrice * km;
        }

        function buildData() {
            var evPrice = val(inputs.evPrice);
            var evEnergyPrice = val(inputs.evEnergyPrice);
            var evConsumption = val(inputs.evConsumption);
            var gasPrice = val(inputs.gasPrice);
            var gasEnergyPrice = val(inputs.gasEnergyPrice);
            var gasConsumption = val(inputs.gasConsumption);
            var evData = [];
            var gasData = [];
            for (var km = 0; km <= MAX_KM; km += 5000) {
                evData.push({ x: km, y: tco(evPrice, evConsumption, evEnergyPrice, km) });
                gasData.push({ x: km, y: tco(gasPrice, gasConsumption, gasEnergyPrice, km) });
            }
            return { evData: evData, gasData: gasData };
        }

        var initial = buildData();

        var chart = new Chart(document.getElementById('chart'), {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: t().evLabel,
                        data: initial.evData,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37,99,235,.1)',
                        pointRadius: 0,
                        borderWidth: 2,
                    },
                    {
                        label: t().gasLabel,
                        data: initial.gasData,
                        borderColor: '#dc2626',
                        backgroundColor: 'rgba(220,38,38,.1)',
                        pointRadius: 0,
                        borderWidth: 2,
                    },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        type: 'linear',
                        min: 0,
                        max: MAX_KM,
                        title: { display: true, text: t().xAxis },
                        ticks: {
                            stepSize: 25000,
                            callback: function(v) { return v >= 1000 ? v / 1000 + 'k' : v; },
                        },
                    },
                    y: {
                        title: { display: true, text: t().yAxis },
                        ticks: {
                            callback: function(v) { return v.toLocaleString(); },
                        },
                    },
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            title: function(items) { return Number(items[0].parsed.x).toLocaleString() + ' km'; },
                            label: function(item) { return item.dataset.label + ': €' + Math.round(item.parsed.y).toLocaleString(); },
                        },
                    },
                },
            },
        });

        var breakevenEl = document.getElementById('breakeven');

        function updateBreakeven() {
            var s = t();
            var evPrice = val(inputs.evPrice);
            var evCostPerKm = val(inputs.evConsumption) / 100 * val(inputs.evEnergyPrice);
            var gasCostPerKm = val(inputs.gasConsumption) / 100 * val(inputs.gasEnergyPrice);
            var gasPrice = val(inputs.gasPrice);
            var diff = gasCostPerKm - evCostPerKm;
            if (diff <= 0) {
                breakevenEl.textContent = evPrice <= gasPrice
                    ? s.evAlwaysCheaper
                    : s.gasAlwaysCheaper;
                return;
            }
            var km = (evPrice - gasPrice) / diff;
            if (km <= 0) {
                breakevenEl.textContent = s.evAlwaysCheaper;
            } else if (km > MAX_KM) {
                breakevenEl.textContent = s.noBreakeven;
            } else {
                breakevenEl.textContent = s.breakevenAt(Math.round(km).toLocaleString());
            }
        }

        function applyLanguage() {
            var s = t();
            document.documentElement.lang = lang;
            document.getElementById('title').textContent = s.title;
            document.getElementById('ev-heading').textContent = s.evHeading;
            document.getElementById('gas-heading').textContent = s.gasHeading;
            document.getElementById('ev-price-label').textContent = s.carPrice;
            document.getElementById('ev-energy-price-label').textContent = s.evEnergyPrice;
            document.getElementById('ev-consumption-label').textContent = s.evConsumption;
            document.getElementById('gas-price-label').textContent = s.carPrice;
            document.getElementById('gas-energy-price-label').textContent = s.gasEnergyPrice;
            document.getElementById('gas-consumption-label').textContent = s.gasConsumption;
            document.getElementById('lang-toggle').textContent = s.toggleLabel;
            chart.data.datasets[0].label = s.evLabel;
            chart.data.datasets[1].label = s.gasLabel;
            chart.options.scales.x.title.text = s.xAxis;
            chart.options.scales.y.title.text = s.yAxis;
            chart.update();
            updateBreakeven();
        }

        function updateChart() {
            var data = buildData();
            chart.data.datasets[0].data = data.evData;
            chart.data.datasets[1].data = data.gasData;
            chart.update();
            updateBreakeven();
        }

        updateBreakeven();

        document.getElementById('lang-toggle').addEventListener('click', function() {
            lang = lang === 'en' ? 'de' : 'en';
            applyLanguage();
        });

        var keys = Object.keys(inputs);
        for (var i = 0; i < keys.length; i++) {
            inputs[keys[i]].addEventListener('input', updateChart);
        }
    </script>
</body>
</html>
